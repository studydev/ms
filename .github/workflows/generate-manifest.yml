name: Generate docs/manifest.json (manual)

# NOTE:
# 기본 흐름: manifest.json은 **로컬에서 수동 생성**해 커밋한다.
#     python3 scripts/generate_manifest.py
# 이 워크플로는 필요 시 workflow_dispatch 로만 돌려서
# 생성 결과를 artifact 로 받아볼 수 있도록 남겨 둔다.
# 저장소에 자동 커밋/푸시하지 않는다 (로컬 수정과 충돌 방지).
# 나중에 자동 커밋으로 되돌리고 싶으면 push 트리거와 commit step 을 다시 추가하면 된다.

on:
    workflow_dispatch:

permissions:
    contents: read

jobs:
    build-manifest:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: '3.12'

            - name: Generate manifest.json
              run: |
                  python3 scripts/generate_manifest.py

            - name: Show diff (informational only)
              run: |
                  git --no-pager diff -- docs/manifest.json || true

            - name: Upload manifest artifact
              uses: actions/upload-artifact@v4
              with:
                  name: manifest-json
                  path: docs/manifest.json
